<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>경제 방향 · MarketSignal</title>
<meta name="description" content="공시·리포트·뉴스·유튜브를 임팩트 점수로 정렬한 투자 시그널 — MarketSignal">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f7fa; --card:#fff; --border:#e2e8f0; --text:#2d3748; --muted:#718096;
  --primary:#3182ce; --navy:#1a365d;
  --src-disclosure:#c53030; --src-report:#2b6cb0; --src-conf:#805ad5;
  --src-news:#38a169; --src-youtube:#dd6b20;
}
body{font-family:-apple-system,'Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);line-height:1.6}
a{color:var(--primary);text-decoration:none}a:hover{text-decoration:underline}
.container{max-width:960px;margin:0 auto;padding:16px}

/* Top sticky bar */
.topbar{position:sticky;top:0;z-index:50;background:rgba(245,247,250,.96);backdrop-filter:blur(8px);padding:10px 0;margin:-16px -16px 14px;padding-left:16px;padding-right:16px;border-bottom:1px solid var(--border)}
.search-row{display:flex;gap:8px;align-items:center}
.search-input{flex:1;padding:9px 12px;border:1px solid var(--border);border-radius:8px;font-family:inherit;font-size:.95em;background:#fff}
.search-input:focus{outline:none;border-color:var(--primary);box-shadow:0 0 0 2px rgba(49,130,206,.15)}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 0 2px;scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex-shrink:0;padding:5px 12px;border-radius:18px;font-size:.82em;font-weight:600;background:#edf2f7;color:#4a5568;border:1px solid transparent;cursor:pointer;white-space:nowrap}
.chip.active{background:var(--primary);color:#fff}
.chip.fav{background:#fffaf0;color:#c05621;border-color:#fbd38d}
.chip.fav.active{background:#dd6b20;color:#fff;border-color:#dd6b20}

/* Header */
h1{color:var(--navy);font-size:1.6em;letter-spacing:-.5px;margin-bottom:2px}
.subtitle{color:var(--muted);font-size:.88em;margin-bottom:14px}
.nav{margin-bottom:12px;font-size:.9em}
.nav a{margin-right:14px;color:var(--muted)}
.nav a.current{color:var(--navy);font-weight:700}

/* Sections */
.section{margin:22px 0}
.section-head{display:flex;align-items:baseline;gap:8px;margin-bottom:10px}
.section-title{font-size:1.05em;font-weight:700;color:var(--navy)}
.section-count{font-size:.78em;color:var(--muted)}
.section-empty{padding:18px;color:var(--muted);text-align:center;background:var(--card);border-radius:8px;font-size:.88em}

/* Signal traffic light (placeholder for Day 3) */
.signals{display:flex;gap:8px;flex-wrap:wrap;background:var(--card);border-radius:10px;padding:12px 14px;box-shadow:0 1px 3px rgba(0,0,0,.06);margin-bottom:8px}
.signal-item{display:flex;align-items:center;gap:6px;font-size:.88em;color:#4a5568}
.signal-dot{width:10px;height:10px;border-radius:50%}
.dot-green{background:#38a169}.dot-yellow{background:#d69e2e}.dot-red{background:#e53e3e}.dot-gray{background:#a0aec0}

/* Card */
.cards{display:grid;grid-template-columns:1fr;gap:10px}
@media(min-width:720px){.cards{grid-template-columns:1fr 1fr}}
.card{background:var(--card);border-radius:10px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.06);cursor:pointer;border-left:4px solid #cbd5e0;transition:transform .12s,box-shadow .12s}
.card:hover{transform:translateY(-1px);box-shadow:0 3px 10px rgba(0,0,0,.08)}
.card.src-disclosure{border-left-color:var(--src-disclosure)}
.card.src-report{border-left-color:var(--src-report)}
.card.src-conf_call{border-left-color:var(--src-conf)}
.card.src-news{border-left-color:var(--src-news)}
.card.src-youtube{border-left-color:var(--src-youtube)}
.card-top{display:flex;align-items:center;gap:6px;flex-wrap:wrap;font-size:.78em;color:var(--muted);margin-bottom:6px}
.imp-badge{font-weight:800;font-size:.95em;color:#fff;padding:1px 8px;border-radius:4px;letter-spacing:-.02em}
.imp-9{background:#c53030}.imp-7{background:#dd6b20}.imp-5{background:#3182ce}.imp-3{background:#a0aec0}.imp-0{background:#cbd5e0}
.dir-badge{font-weight:700;font-size:.82em;padding:1px 7px;border-radius:4px;letter-spacing:-.02em}
.dir-up{background:#fed7d7;color:#c53030}
.dir-down{background:#c6f6d5;color:#22543d}
.dir-neutral{background:#edf2f7;color:#718096}
.src-label{font-weight:700;padding:1px 7px;border-radius:4px;font-size:.74em}
.src-label.src-disclosure{background:#fff5f5;color:var(--src-disclosure)}
.src-label.src-report{background:#ebf8ff;color:var(--src-report)}
.src-label.src-conf_call{background:#faf5ff;color:var(--src-conf)}
.src-label.src-news{background:#f0fff4;color:var(--src-news)}
.src-label.src-youtube{background:#fffaf0;color:var(--src-youtube)}
.cat-tag{font-size:.74em;padding:1px 7px;border-radius:4px;background:#edf2f7;color:#4a5568;font-weight:600}
.card-title{font-size:1em;font-weight:700;color:var(--navy);line-height:1.4;margin-bottom:6px;letter-spacing:-.2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-summary{font-size:.85em;color:#4a5568;line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;margin-bottom:6px}
.card-stocks{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.stock-pill{background:#ebf8ff;color:#2b6cb0;border-radius:4px;padding:1px 7px;font-size:.74em;font-weight:600;cursor:pointer}
.stock-pill:hover{background:#bee3f8}
.stock-pill.fav{background:#fed7aa;color:#c05621}

/* My stocks summary */
.mystock-row{display:flex;justify-content:space-between;align-items:center;padding:9px 14px;background:var(--card);border-radius:8px;margin-bottom:6px;cursor:pointer;border-left:3px solid #fbd38d}
.mystock-row:hover{background:#fffaf0}
.mystock-name{font-weight:700;color:var(--navy)}
.mystock-count{font-size:.82em;color:var(--muted)}
.mystock-right{display:flex;align-items:center;gap:10px}
.mystock-del{background:none;border:none;color:#a0aec0;font-size:1.1em;cursor:pointer;padding:2px 6px;border-radius:4px}
.mystock-del:hover{background:#fed7d7;color:#c53030}
.mystock-count strong{color:var(--src-disclosure);font-weight:700}
.mystock-add{display:flex;gap:6px;margin-top:8px}
.mystock-add input{flex:1;padding:7px 10px;border:1px solid var(--border);border-radius:6px;font-size:.9em}
.mystock-add button{background:var(--primary);color:#fff;border:none;padding:7px 14px;border-radius:6px;font-size:.85em;font-weight:600;cursor:pointer}

/* Detail modal (post and stock) */
.overlay{position:fixed;inset:0;background:rgba(26,54,93,.45);z-index:200;display:none;align-items:flex-start;justify-content:center;overflow-y:auto;padding:24px 12px}
.overlay.open{display:flex}
.panel{background:var(--card);max-width:760px;width:100%;border-radius:12px;box-shadow:0 20px 60px rgba(0,0,0,.2);overflow:hidden;animation:slideUp .18s ease-out}
@keyframes slideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.panel-head{padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.panel-head .close{margin-left:auto;background:none;border:none;font-size:1.4em;color:var(--muted);cursor:pointer;padding:0 6px}
.panel-body{padding:18px 22px 26px}
.panel-title{font-size:1.35em;font-weight:700;color:var(--navy);letter-spacing:-.5px;margin-bottom:8px}
.panel-meta{display:flex;flex-wrap:wrap;gap:8px;font-size:.85em;color:var(--muted);margin-bottom:14px}
.panel-summary{font-size:.95em;line-height:1.7;color:#4a5568}
.panel-summary p{margin-bottom:8px}
.panel-summary ul{margin:8px 0 8px 20px}
.panel-fb{margin-top:14px;padding:10px 14px;background:#fffaf0;border-left:3px solid #dd6b20;border-radius:0 6px 6px 0;font-size:.9em;color:#744210}
.panel-link{margin-top:18px;display:inline-block;padding:7px 14px;background:#ebf8ff;color:var(--primary);border-radius:6px;font-weight:600;font-size:.9em}

/* Stock detail page */
.stock-summary-bar{background:linear-gradient(135deg,#1a365d,#2b6cb0);color:#fff;padding:14px 20px;border-radius:10px;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.stock-summary-name{font-size:1.3em;font-weight:800}
.stock-summary-count{font-size:.85em;opacity:.85}
.stock-fav-btn{background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.3);color:#fff;padding:6px 12px;border-radius:6px;font-size:.85em;font-weight:600;cursor:pointer}
.stock-fav-btn.on{background:#dd6b20;border-color:#dd6b20}

.footer{text-align:center;padding:24px 0;color:#a0aec0;font-size:.82em;border-top:1px solid var(--border);margin-top:30px}
</style>
</head>
<body>
<div class="container">
  <h1>MarketSignal · 경제 방향</h1>
  <div class="subtitle">공시·리포트·뉴스·유튜브 — 임팩트 순으로 정렬</div>
  <div class="nav">
    <a href="index.html">홈</a>
    <a href="closing_picks.html">종가매수</a>
    <a href="breakout_picks.html">돌파매수</a>
    <a href="economy.html" class="current">경제 방향</a>
  </div>

  <div class="topbar">
    <div class="search-row">
      <input class="search-input" id="search" placeholder="🔍 종목·키워드 검색">
    </div>
    <div class="chips" id="chips">
      <button class="chip fav" data-filter="fav">⭐ 내 종목</button>
      <button class="chip active" data-filter="all">전체</button>
      <button class="chip" data-filter="cat:거시">거시</button>
      <button class="chip" data-filter="cat:주식">주식</button>
      <button class="chip" data-filter="cat:부동산">부동산</button>
      <button class="chip" data-filter="cat:채권">채권</button>
      <button class="chip" data-filter="src:disclosure">🟥 공시</button>
      <button class="chip" data-filter="src:report">🟦 리포트</button>
      <button class="chip" data-filter="src:conf_call">🟪 컨콜</button>
      <button class="chip" data-filter="src:news">🟢 뉴스</button>
      <button class="chip" data-filter="src:youtube">🟧 유튜브</button>
      <button class="chip" data-filter="imp:7">🔥 임팩트 7+</button>
      <button class="chip" data-filter="dir:up">🔼 호재</button>
      <button class="chip" data-filter="dir:down">🔽 악재</button>
    </div>
  </div>

  <!-- 시그널 신호등 (Day 3 자리) -->
  <div class="section">
    <div class="signals">
      <div class="signal-item"><span class="signal-dot dot-gray"></span>KOSPI 시그널</div>
      <div class="signal-item"><span class="signal-dot dot-gray"></span>USD/KRW</div>
      <div class="signal-item"><span class="signal-dot dot-gray"></span>금리</div>
      <div class="signal-item" style="margin-left:auto;font-size:.78em">— 시그널 위젯은 곧 가동</div>
    </div>
  </div>

  <!-- 내 종목 (⭐ chip 활성 시에만 표시) -->
  <div class="section" id="favSection" style="display:none">
    <div class="section-head">
      <div class="section-title">⭐ 내 종목</div>
      <div class="section-count" id="favCount">관심 종목을 등록하세요</div>
    </div>
    <div id="favList"></div>
    <div class="mystock-add">
      <input id="favInput" placeholder="종목명 입력 (예: 삼성전자)">
      <button id="favAdd">추가</button>
    </div>
  </div>

  <!-- 강한 시그널 (★≥7) -->
  <div class="section topical">
    <div class="section-head">
      <div class="section-title">🚨 강한 시그널</div>
      <div class="section-count">임팩트 7+ · <span id="topCount">0</span>건</div>
    </div>
    <div class="cards" id="topCards"></div>
    <div class="section-empty" id="topEmpty" style="display:none">오늘 임팩트 7+ 자료가 없습니다</div>
  </div>

  <!-- 주목 (★=6) -->
  <div class="section topical">
    <div class="section-head">
      <div class="section-title">🔥 주목</div>
      <div class="section-count">임팩트 6 · <span id="watchCount">0</span>건</div>
    </div>
    <div class="cards" id="watchCards"></div>
  </div>

  <!-- 거시·시황 -->
  <div class="section topical">
    <div class="section-head">
      <div class="section-title">💬 거시·시황</div>
      <div class="section-count"><span id="macroCount">0</span>건</div>
    </div>
    <div class="cards" id="macroCards"></div>
  </div>

  <!-- 오늘의 공시 (DART) -->
  <div class="section topical">
    <div class="section-head">
      <div class="section-title">📋 오늘의 공시</div>
      <div class="section-count">DART · <span id="discCount">0</span>건</div>
    </div>
    <div class="cards" id="discCards"></div>
  </div>

  <!-- 산업·종목 -->
  <div class="section topical">
    <div class="section-head">
      <div class="section-title">📈 산업·종목</div>
      <div class="section-count"><span id="stockCount">0</span>건</div>
    </div>
    <div class="cards" id="stockCards"></div>
  </div>

  <!-- 모두 보기 (필터 결과) -->
  <div class="section" id="allSection" style="display:none">
    <div class="section-head">
      <div class="section-title">📋 검색·필터 결과</div>
      <div class="section-count"><span id="allCount">0</span>건</div>
    </div>
    <div class="cards" id="allCards"></div>
  </div>

  <div class="footer">
    <p>MarketSignal · 경제 방향 · 본 페이지는 정보 제공 목적이며 투자 자문이 아닙니다.</p>
  </div>
</div>

<!-- Post detail overlay -->
<div class="overlay" id="postOverlay">
  <div class="panel">
    <div class="panel-head" id="postHead"></div>
    <div class="panel-body" id="postBody"></div>
  </div>
</div>

<!-- Stock detail overlay -->
<div class="overlay" id="stockOverlay">
  <div class="panel">
    <div class="panel-head" id="stockHead"></div>
    <div class="panel-body" id="stockBody"></div>
  </div>
</div>

<script>
const FEED='economy_direction.json';
const $=id=>document.getElementById(id);
const SRC_LABEL={youtube:'유튜브',report:'리포트',disclosure:'공시',conf_call:'컨콜',news:'뉴스'};
const FAV_KEY='ms_fav_stocks_v1';

let POSTS=[]; let activeFilter='all'; let searchTerm='';

function getFav(){try{return JSON.parse(localStorage.getItem(FAV_KEY)||'[]')}catch{return[]}}
function setFav(arr){localStorage.setItem(FAV_KEY,JSON.stringify(arr))}
function toggleFav(name){const f=getFav();const i=f.indexOf(name);if(i>=0)f.splice(i,1);else f.push(name);setFav(f);return f}

function esc(s){return(s||'').replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}
function nl2br(s){return esc(s).replace(/\n/g,'<br>')}
function stripHtml(s){return(s||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim()}
function impClass(s){const n=s==null?5:s;return n>=9?'imp-9':n>=7?'imp-7':n>=5?'imp-5':n>=3?'imp-3':'imp-0'}
function dirBadge(d){if(d==='up')return '<span class="dir-badge dir-up">🔼 호재</span>';if(d==='down')return '<span class="dir-badge dir-down">🔽 악재</span>';if(d==='neutral')return '<span class="dir-badge dir-neutral">— 중립</span>';return '';}

function cardHtml(p){
  const sc=p.impact_score==null?5:p.impact_score;
  const src=p.source_type||'youtube';
  const fav=getFav();
  const stocksHtml=(p.stocks||[]).slice(0,4).map(s=>{
    const isFav=fav.includes(s);
    return `<span class="stock-pill ${isFav?'fav':''}" data-stock="${esc(s)}">${esc(s)}</span>`;
  }).join('');
  return `<article class="card src-${src}" data-id="${p.id}">
    <div class="card-top">
      <span class="imp-badge ${impClass(sc)}">★ ${sc}</span>
      ${dirBadge(p.direction)}
      <span class="src-label src-${src}">${SRC_LABEL[src]||src}</span>
      <span class="cat-tag">${esc(p.category)}</span>
      ${p.uploaded_on?'<span>'+esc(p.uploaded_on)+'</span>':''}
      ${p.channel?'<span>· '+esc(p.channel)+'</span>':''}
    </div>
    <div class="card-title">${esc(p.title)}</div>
    ${p.summary?'<div class="card-summary">'+esc(stripHtml(p.summary))+'</div>':''}
    ${stocksHtml?'<div class="card-stocks">'+stocksHtml+'</div>':''}
  </article>`;
}

function bindCards(container){
  container.querySelectorAll('.card').forEach(el=>{
    el.addEventListener('click',ev=>{
      if(ev.target.classList.contains('stock-pill'))return;
      openPost(Number(el.dataset.id));
    });
  });
  container.querySelectorAll('.stock-pill').forEach(el=>{
    el.addEventListener('click',ev=>{
      ev.stopPropagation();
      openStock(el.dataset.stock);
    });
  });
}

function openPost(id){
  const p=POSTS.find(x=>x.id===id);if(!p)return;
  const sc=p.impact_score==null?5:p.impact_score;
  const src=p.source_type||'youtube';
  $('postHead').innerHTML=`
    <span class="imp-badge ${impClass(sc)}">★ ${sc}</span>
    <span class="src-label src-${src}">${SRC_LABEL[src]||src}</span>
    <span class="cat-tag">${esc(p.category)}</span>
    <button class="close" onclick="closeOverlay('postOverlay')">×</button>`;
  const stocksHtml=(p.stocks||[]).map(s=>`<span class="stock-pill" onclick="openStock('${esc(s)}')">${esc(s)}</span>`).join(' ');
  const link=p.youtube_url||p.source_url||'';
  $('postBody').innerHTML=`
    <div class="panel-title">${esc(p.title)}</div>
    <div class="panel-meta">
      ${p.channel?'<span>📺 '+esc(p.channel)+'</span>':''}
      ${p.uploaded_on?'<span>'+esc(p.uploaded_on)+'</span>':''}
    </div>
    <div class="panel-summary">${p.summary||'<em>요약 없음</em>'}</div>
    ${p.feedback?'<div class="panel-fb">💡 '+esc(p.feedback)+'</div>':''}
    ${stocksHtml?'<div class="card-stocks" style="margin-top:14px">'+stocksHtml+'</div>':''}
    ${link?'<a class="panel-link" href="'+esc(link)+'" target="_blank" rel="noopener">원문 보기 ↗</a>':''}`;
  $('postOverlay').classList.add('open');document.body.style.overflow='hidden';
}

function openStock(name){
  closeOverlay('postOverlay');
  const matches=POSTS.filter(p=>(p.stocks||[]).includes(name)).sort((a,b)=>(b.impact_score||5)-(a.impact_score||5));
  const fav=getFav();const isFav=fav.includes(name);
  $('stockHead').innerHTML=`
    <div style="font-weight:800;font-size:1.1em;color:var(--navy)">${esc(name)}</div>
    <button class="stock-fav-btn ${isFav?'on':''}" onclick="favStock('${esc(name)}')" id="favBtn">${isFav?'★ 등록됨':'☆ 내 종목 추가'}</button>
    <button class="close" onclick="closeOverlay('stockOverlay')">×</button>`;
  if(!matches.length){
    $('stockBody').innerHTML='<div class="section-empty">관련 자료가 아직 없습니다</div>';
  }else{
    $('stockBody').innerHTML=`<div class="cards" id="stockMatches">${matches.map(cardHtml).join('')}</div>`;
    setTimeout(()=>bindCards($('stockMatches')),0);
  }
  $('stockOverlay').classList.add('open');document.body.style.overflow='hidden';
}

function favStock(name){
  toggleFav(name);
  openStock(name); // re-render
  renderFav();
  // refresh stock pills
  document.querySelectorAll('.stock-pill[data-stock="'+CSS.escape(name)+'"]').forEach(el=>{
    el.classList.toggle('fav', getFav().includes(name));
  });
}

function closeOverlay(id){$(id).classList.remove('open');document.body.style.overflow=''}
function removeFav(name){
  setFav(getFav().filter(s=>s!==name));
  renderFav();renderAllSections();
}
window.openStock=openStock;window.closeOverlay=closeOverlay;window.favStock=favStock;window.removeFav=removeFav;

function applyFilter(post){
  const term=searchTerm.trim().toLowerCase();
  if(term){
    const hay=(post.title+' '+(post.summary||'')+' '+(post.stocks||[]).join(' ')+' '+(post.tags||[]).join(' ')+' '+(post.channel||'')).toLowerCase();
    if(!hay.includes(term))return false;
  }
  if(activeFilter==='all')return true;
  if(activeFilter==='fav'){const f=getFav();return(post.stocks||[]).some(s=>f.includes(s))}
  if(activeFilter.startsWith('cat:'))return post.category===activeFilter.slice(4);
  if(activeFilter.startsWith('src:'))return(post.source_type||'youtube')===activeFilter.slice(4);
  if(activeFilter.startsWith('imp:'))return(post.impact_score||5)>=Number(activeFilter.slice(4));
  if(activeFilter.startsWith('dir:'))return(post.direction||'')===activeFilter.slice(4);
  return true;
}

function renderTop(){
  const items=POSTS.filter(p=>(p.impact_score||5)>=7).filter(applyFilter).slice(0,12);
  $('topCount').textContent=items.length;
  $('topCards').innerHTML=items.map(cardHtml).join('');
  $('topEmpty').style.display=items.length?'none':'block';
  bindCards($('topCards'));
}

function renderWatch(){
  const items=POSTS.filter(p=>(p.impact_score||5)===6).filter(applyFilter).slice(0,12);
  $('watchCount').textContent=items.length;
  $('watchCards').innerHTML=items.map(cardHtml).join('');
  bindCards($('watchCards'));
}

function renderMacro(){
  const items=POSTS.filter(p=>p.category==='거시').filter(applyFilter).slice(0,12);
  $('macroCount').textContent=items.length;
  $('macroCards').innerHTML=items.map(cardHtml).join('');
  bindCards($('macroCards'));
}

function renderDisc(){
  const items=POSTS.filter(p=>(p.source_type||'')==='disclosure').filter(applyFilter).slice(0,30);
  $('discCount').textContent=items.length;
  $('discCards').innerHTML=items.map(cardHtml).join('');
  bindCards($('discCards'));
}

function renderStock(){
  const items=POSTS.filter(p=>p.category==='주식').filter(applyFilter).slice(0,30);
  $('stockCount').textContent=items.length;
  $('stockCards').innerHTML=items.map(cardHtml).join('');
  bindCards($('stockCards'));
}

function renderAll(){
  // Show "all results" section only when search/filter is narrowing
  const narrowing=searchTerm.trim()||(activeFilter!=='all');
  if(!narrowing){$('allSection').style.display='none';return}
  const items=POSTS.filter(applyFilter);
  $('allCount').textContent=items.length;
  $('allCards').innerHTML=items.map(cardHtml).join('');
  $('allSection').style.display='block';
  bindCards($('allCards'));
}

function renderFav(){
  const fav=getFav();
  const list=$('favList');
  if(!fav.length){
    $('favCount').textContent='관심 종목을 등록하세요';
    list.innerHTML='';return;
  }
  const rows=fav.map(name=>{
    const matches=POSTS.filter(p=>(p.stocks||[]).includes(name));
    const newCount=matches.filter(p=>(p.impact_score||5)>=7).length;
    return `<div class="mystock-row" onclick="openStock('${esc(name)}')">
      <div><span class="mystock-name">${esc(name)}</span></div>
      <div class="mystock-right">
        <span class="mystock-count">${matches.length}건${newCount>0?' · <strong>임팩트 '+newCount+'</strong>':''}</span>
        <button class="mystock-del" onclick="event.stopPropagation();removeFav('${esc(name)}')" title="삭제">×</button>
      </div>
    </div>`;
  }).join('');
  $('favCount').textContent=fav.length+'개';
  list.innerHTML=rows;
}

function renderAllSections(){
  const favMode=activeFilter==='fav';
  $('favSection').style.display=favMode?'block':'none';
  document.querySelectorAll('.section.topical').forEach(el=>{el.style.display=favMode?'none':'block'});
  if(favMode){renderFav();renderAll();return}
  renderTop();renderWatch();renderMacro();renderDisc();renderStock();renderAll();
}

// Chip filter binding
$('chips').querySelectorAll('.chip').forEach(c=>{
  c.addEventListener('click',()=>{
    $('chips').querySelectorAll('.chip').forEach(x=>x.classList.remove('active'));
    c.classList.add('active');
    activeFilter=c.dataset.filter;
    renderAllSections();
  });
});

// Search
let searchTimer;
$('search').addEventListener('input',e=>{
  clearTimeout(searchTimer);
  searchTimer=setTimeout(()=>{searchTerm=e.target.value;renderAllSections()},150);
});

// Add fav
$('favAdd').addEventListener('click',()=>{
  const v=$('favInput').value.trim();
  if(v.length<2){$('favInput').value='';return;}
  const f=getFav();if(!f.includes(v)){f.push(v);setFav(f)}
  $('favInput').value='';renderFav();renderAllSections();
});
$('favInput').addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.isComposing&&e.keyCode!==229)$('favAdd').click()});

// Close on overlay click / Esc
['postOverlay','stockOverlay'].forEach(id=>{
  $(id).addEventListener('click',e=>{if(e.target===$(id))closeOverlay(id)});
});
document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){closeOverlay('postOverlay');closeOverlay('stockOverlay')}
});

// Load
fetch(FEED,{cache:'no-store'})
  .then(r=>r.json())
  .then(data=>{POSTS=data.posts||[];renderAllSections()})
  .catch(err=>{
    document.querySelectorAll('.cards').forEach(c=>c.innerHTML='<div class="section-empty">데이터 로드 실패</div>');
    console.error(err);
  });
</script>
</body>
</html>
